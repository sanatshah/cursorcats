<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' ws: http://localhost:*; script-src 'self' 'unsafe-inline' http://localhost:*; style-src 'self' 'unsafe-inline'; img-src 'self' file: data: blob:; frame-src 'self' file: data: blob: http://localhost:*; connect-src 'self' ws: http://localhost:*;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversation</title>
    <link rel="stylesheet" href="/src/conversation.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="header-close-cluster">
          <button type="button" id="btn-dismiss" class="header-btn dismiss-btn">
            Close Cat
          </button>
          <button type="button" id="btn-close" class="close-btn" aria-label="Close">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
        <div class="header-body">
          <div class="header-prompt-row">
            <p class="header-prompt" id="prompt-sent" hidden></p>
            <p class="header-location" id="meta" hidden></p>
          </div>
          <div class="header-actions-row">
            <div class="header-actions-left">
              <div id="header-more-wrap" class="header-more-wrap" hidden>
                <button
                  type="button"
                  id="btn-header-more"
                  class="header-more-btn"
                  aria-haspopup="menu"
                  aria-expanded="false"
                  aria-controls="header-more-menu"
                  aria-label="More actions"
                >
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true">
                    <circle cx="5" cy="12" r="1.75"></circle>
                    <circle cx="12" cy="12" r="1.75"></circle>
                    <circle cx="19" cy="12" r="1.75"></circle>
                  </svg>
                </button>
                <div id="header-more-menu" class="header-more-dropdown" role="menu" hidden>
                  <button
                    type="button"
                    id="btn-revert"
                    class="header-menu-item header-menu-item--danger"
                    role="menuitem"
                    hidden
                  >
                    Revert changes
                  </button>
                  <button
                    type="button"
                    id="btn-view-conversation"
                    class="header-menu-item"
                    role="menuitem"
                    hidden
                  >
                    View conversation
                  </button>
                </div>
              </div>
            </div>
            <div class="header-actions-right">
              <div id="commit-push-wrap" class="commit-push-wrap" hidden>
                <button type="button" id="btn-commit-push" class="header-btn commit-push-btn">
                  Commit &amp; push
                </button>
                <span id="commit-push-branch" class="commit-push-branch"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="answer-toggle-bar" class="answer-page-panel" hidden>
        <button type="button" id="btn-view-answer" class="answer-page-btn answer-page-btn--secondary" hidden>
          View answer
        </button>
      </div>
      <div id="answer-error-row" class="answer-error-row" hidden>
        <span id="answer-page-error" class="answer-page-error"></span>
      </div>
      <div id="revert-error-row" class="revert-error-row" hidden>
        <span id="revert-error" class="revert-error"></span>
      </div>
      <div id="cloud-result-row" class="cloud-result-row" hidden></div>
      <div class="main-stage" id="main-stage">
        <div id="answer-preview-pane" class="answer-preview-pane" hidden>
          <div id="answer-working-pane" class="answer-working-pane" hidden>
            <div class="answer-working-text">Meow, working on it...</div>
          </div>
          <iframe
            id="answer-preview-iframe"
            class="answer-preview-iframe"
            title="Assistant answer"
          ></iframe>
        </div>
        <div id="conversation-section" class="conversation-section">
          <div id="log" class="log" role="log" aria-live="polite" aria-relevant="additions"></div>
        </div>
      </div>
      <footer class="composer">
        <div class="composer-row">
          <textarea
            id="followup-input"
            class="composer-input"
            rows="2"
            placeholder="Message the cat"
            aria-label="Message the cat"
            autocomplete="off"
          ></textarea>
          <button type="button" id="btn-send" class="composer-send">Send</button>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/conversation.js"></script>
  </body>
</html>
