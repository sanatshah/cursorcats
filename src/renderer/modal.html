<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' ws: http://localhost:*; script-src 'self' 'unsafe-inline' http://localhost:*; style-src 'self' 'unsafe-inline'; img-src 'self' file: data: blob:; connect-src 'self' ws: http://localhost:*;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Cursor Cat</title>
    <link rel="stylesheet" href="/src/modal.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <img
          id="header-app-icon"
          class="header-app-icon"
          src=""
          alt=""
          width="20"
          height="20"
          draggable="false"
        />
        <div class="header-input-col">
          <textarea
            id="prompt"
            rows="1"
            autocomplete="off"
            placeholder="What should I work on?"
            spellcheck="true"
            autofocus
          ></textarea>
          <div id="prompt-send-hint" class="prompt-send-hint" aria-live="polite"></div>
        </div>
      </div>

      <div class="section-title">Projects</div>
      
      <div class="list">
        <div class="list-item" id="btn-choose-folder">
          <div class="item-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
              <line x1="12" y1="11" x2="12" y2="17"></line>
              <line x1="9" y1="14" x2="15" y2="14"></line>
            </svg>
          </div>
          <div class="item-content">
            <div class="item-title">New Project</div>
            <div class="item-subtitle">Choose a folder…</div>
          </div>
          <div class="item-shortcut">
            <kbd>⌘</kbd><kbd>O</kbd>
          </div>
        </div>

        <div id="recent-folders-container" hidden>
          <div id="recent-folders-list"></div>
        </div>
      </div>

      <div class="footer">
        <span id="error" class="error" role="alert" hidden></span>
        <span id="spawn-hint" class="hint"></span>
      </div>
    </div>
    <script type="module" src="/src/modal.js"></script>
  </body>
</html>
