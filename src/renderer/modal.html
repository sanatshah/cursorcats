<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' ws: http://localhost:*; script-src 'self' 'unsafe-inline' http://localhost:*; style-src 'self' 'unsafe-inline'; img-src 'self' file: data: blob:; connect-src 'self' ws: http://localhost:*;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Cursor Cat</title>
    <link rel="stylesheet" href="/src/modal.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div
          id="header-app-icon"
          class="header-app-icon"
          role="img"
          aria-label="Cursor Cat"
        ></div>
        <div class="header-input-col">
          <div id="cat-agent-name-row" class="cat-agent-name-row" hidden>
            <label class="cat-agent-name-label" for="cat-agent-name">Cat Name</label>
            <input
              id="cat-agent-name"
              class="cat-agent-name-input"
              type="text"
              autocomplete="off"
              spellcheck="false"
              placeholder="e.g. Weekly tidy cat"
              maxlength="120"
            />
          </div>
          <div id="cat-agent-heartbeat-row" class="cat-agent-heartbeat-row" hidden>
            <label class="cat-agent-heartbeat-label" for="cat-agent-heartbeat">Heartbeat</label>
            <select id="cat-agent-heartbeat" class="cat-agent-heartbeat-select"></select>
          </div>
          <div class="prompt-input-wrap">
            <textarea
              id="prompt"
              rows="1"
              autocomplete="off"
              placeholder="Meow, what should I work on?"
              spellcheck="true"
              autofocus
            ></textarea>
            <div id="skill-menu" class="skill-menu" role="listbox" aria-label="Skills" hidden></div>
          </div>
          <div class="prompt-meta-wrap">
            <div class="prompt-meta">
              <!-- Model picker deprecated: see MODEL_SELECTION_UI_ENABLED in modal.js -->
              <label id="create-cat-agent-wrap" class="cat-agent-create" hidden>
                <input id="create-cat-agent-toggle" type="checkbox" />
                <span>Create cat agent</span>
              </label>
            </div>
          </div>
        </div>
      </div>

      <section id="api-key-section" class="api-key-section" hidden>
        <div class="section-title">Cursor API key</div>
        <p id="api-key-hint" class="api-key-hint">
          No <code>CURSOR_API_KEY</code> saved in your shell config yet. Paste a key from
          <button type="button" id="api-key-dashboard-link" class="api-key-link">Cursor settings</button>
          — we save it to your <code>.zshrc</code> or <code>.bashrc</code> (managed block)
          when you spawn.
        </p>
        <label class="api-key-label" for="api-key-input">API key</label>
        <input
          id="api-key-input"
          class="api-key-input"
          type="password"
          autocomplete="off"
          spellcheck="false"
          placeholder="Paste API key"
        />
      </section>

      <div class="runtime-row" role="radiogroup" aria-label="Agent runtime">
        <button
          id="runtime-local"
          class="runtime-option selected"
          type="button"
          role="radio"
          aria-checked="true"
        >
          Local
        </button>
        <button
          id="runtime-cloud"
          class="runtime-option"
          type="button"
          role="radio"
          aria-checked="false"
        >
          Cloud
        </button>
        <button
          id="runtime-agents"
          class="runtime-option"
          type="button"
          role="radio"
          aria-checked="false"
        >
          Cats
        </button>
      </div>

      <div class="section-title" id="project-section-title">Projects</div>
      
      <div class="list" id="local-project-section">
        <div class="list-item" id="btn-choose-folder">
          <div class="item-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
              <line x1="12" y1="11" x2="12" y2="17"></line>
              <line x1="9" y1="14" x2="15" y2="14"></line>
            </svg>
          </div>
          <div class="item-content">
            <div class="item-title">Open Project</div>
            <div class="item-subtitle">Choose a folder…</div>
          </div>
        </div>

        <div id="recent-folders-container" hidden>
          <div id="recent-folders-list"></div>
        </div>
      </div>

      <div class="list" id="cloud-project-section" hidden>
        <div class="cloud-ref-row">
          <label class="cloud-ref-label" for="cloud-starting-ref">Starting ref</label>
          <input
            id="cloud-starting-ref"
            class="cloud-ref-input"
            type="text"
            autocomplete="off"
            placeholder="Default branch"
          />
        </div>
        <div class="cloud-search-row">
          <label class="cloud-search-label" for="cloud-repo-search">Search repos</label>
          <input
            id="cloud-repo-search"
            class="cloud-search-input"
            type="search"
            autocomplete="off"
            placeholder="owner/name or URL"
          />
        </div>
        <div id="cloud-repos-container">
          <div id="cloud-repos-list"></div>
        </div>
      </div>

      <div class="list" id="agents-list-section" hidden>
        <div id="cat-agents-list"></div>
      </div>

      <div class="footer">
        <span id="error" class="error" role="alert" hidden></span>
        <div class="footer-actions">
          <button id="btn-create-cat" class="primary-action" type="button">Spawn</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/modal.js"></script>
  </body>
</html>
