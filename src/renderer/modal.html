<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' ws: http://localhost:*; script-src 'self' 'unsafe-inline' http://localhost:*; style-src 'self' 'unsafe-inline'; img-src 'self' file: data: blob:; connect-src 'self' ws: http://localhost:*;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Cursor Cat</title>
    <link rel="stylesheet" href="/src/modal.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div
          id="header-app-icon"
          class="header-app-icon"
          role="img"
          aria-label="Cursor Cat"
        ></div>
        <div class="header-input-col">
          <textarea
            id="prompt"
            rows="1"
            autocomplete="off"
            placeholder="Meow, what should I work on?"
            spellcheck="true"
            autofocus
          ></textarea>
          <div class="prompt-meta-wrap">
            <div class="prompt-meta">
              <button
                id="model-picker"
                class="model-chip"
                type="button"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-controls="model-menu"
              >
                <svg class="model-chip-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path>
                </svg>
                <span id="model-chip-label">Composer 2</span>
                <svg class="model-chip-caret" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </button>
              <div id="prompt-send-hint" class="prompt-send-hint" aria-live="polite"></div>
            </div>
            <div id="model-menu" class="model-menu" role="listbox" aria-labelledby="model-picker" hidden></div>
          </div>
        </div>
      </div>

      <div class="runtime-row" role="radiogroup" aria-label="Agent runtime">
        <button
          id="runtime-local"
          class="runtime-option selected"
          type="button"
          role="radio"
          aria-checked="true"
        >
          Local
        </button>
        <button
          id="runtime-cloud"
          class="runtime-option"
          type="button"
          role="radio"
          aria-checked="false"
        >
          Cloud
        </button>
      </div>

      <div class="section-title" id="project-section-title">Projects</div>
      
      <div class="list" id="local-project-section">
        <div class="list-item" id="btn-choose-folder">
          <div class="item-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
              <line x1="12" y1="11" x2="12" y2="17"></line>
              <line x1="9" y1="14" x2="15" y2="14"></line>
            </svg>
          </div>
          <div class="item-content">
            <div class="item-title">New Project</div>
            <div class="item-subtitle">Choose a folder…</div>
          </div>
          <div class="item-shortcut">
            <kbd>⌘</kbd><kbd>O</kbd>
          </div>
        </div>

        <div id="recent-folders-container" hidden>
          <div id="recent-folders-list"></div>
        </div>
      </div>

      <div class="list" id="cloud-project-section" hidden>
        <div class="cloud-ref-row">
          <label class="cloud-ref-label" for="cloud-starting-ref">Starting ref</label>
          <input
            id="cloud-starting-ref"
            class="cloud-ref-input"
            type="text"
            autocomplete="off"
            placeholder="Default branch"
          />
        </div>
        <div class="cloud-search-row">
          <label class="cloud-search-label" for="cloud-repo-search">Search repos</label>
          <input
            id="cloud-repo-search"
            class="cloud-search-input"
            type="search"
            autocomplete="off"
            placeholder="owner/name or URL"
          />
        </div>
        <div id="cloud-repos-container">
          <div id="cloud-repos-list"></div>
        </div>
      </div>

      <div class="footer">
        <span id="error" class="error" role="alert" hidden></span>
        <div class="footer-actions">
          <span id="spawn-hint" class="hint"></span>
          <button id="btn-create-cat" class="primary-action" type="button">Create Cat</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/modal.js"></script>
  </body>
</html>
